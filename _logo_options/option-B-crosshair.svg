<?xml version="1.0" encoding="UTF-8"?>
<!-- Option B — Crosshair.
     A simple ring with four cardinal tick marks crossing the circumference,
     reads as a targeting reticle without anatomy or needle. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeedleGPS">
  <g fill="none" stroke="#0E2030" stroke-width="2.6" stroke-linecap="round">
    <circle cx="32" cy="32" r="22"/>
    <line x1="32" y1="2"  x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="62"/>
    <line x1="2"  y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="62" y2="32"/>
  </g>
  <circle cx="32" cy="32" r="3" fill="#0E2030"/>
</svg>
