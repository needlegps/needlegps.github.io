<?xml version="1.0" encoding="UTF-8"?>
<!-- Option E — Trajectory.
     A dashed line from the upper-left edge to a small filled target near
     the center-bottom, representing the planned insertion path. Smallest
     visual footprint; works at favicon size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeedleGPS">
  <line x1="6" y1="6" x2="38" y2="46"
        stroke="#0E2030" stroke-width="2.6" stroke-linecap="round"
        stroke-dasharray="4 5"/>
  <circle cx="38" cy="46" r="6.5" fill="none" stroke="#0E2030" stroke-width="2.4"/>
  <circle cx="38" cy="46" r="2.4" fill="#0E2030"/>
</svg>
