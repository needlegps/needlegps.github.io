<?xml version="1.0" encoding="UTF-8"?>
<!-- Option F (bonus) — N + reticle monogram.
     A bold geometric "N" letterform with a small target dot replacing the
     counterspace; reads as monogram first, target second. The most
     "wordmark-like" of the alternatives. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeedleGPS">
  <g fill="none" stroke="#0E2030" stroke-width="4.6" stroke-linecap="square" stroke-linejoin="miter">
    <line x1="14" y1="8"  x2="14" y2="56"/>
    <line x1="14" y1="8"  x2="50" y2="56"/>
    <line x1="50" y1="8"  x2="50" y2="56"/>
  </g>
  <circle cx="32" cy="32" r="4" fill="#1FB6C9"/>
</svg>
